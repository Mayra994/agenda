$def with(contacto)
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Borrar Contacto</title>
</head>
<body>

    <h1>¿Estás seguro de que quieres borrar a $contacto['nombre']?</h1>
    
    <form method="POST" action="/borrar_contacto/$contacto['id_contacto']">
        <button type="submit">Confirmar Eliminación</button>
        <a href="/lista_contactos"><button type="button">Cancelar</button></a>
    </form>

</body>
</html>
