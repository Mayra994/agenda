$def with (contacto)


    <h1>Editar Contacto</h1>

    <form method="POST">
        
        <input type="hidden" name="id_contacto" value="$contacto['id_contacto']">

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="$contacto['nombre']" required><br><br>

        <label for="primer_apellido">Primer Apellido:</label>
        <input type="text" id="primer_apellido" name="primer_apellido" value="$contacto['primer_apellido']" required><br><br>

        <label for="segundo_apellido">Segundo Apellido:</label>
        <input type="text" id="segundo_apellido" name="segundo_apellido" value="$contacto['segundo_apellido']"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="$contacto['email']" required><br><br>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" value="$contacto['telefono']" required><br><br>

        
         <a href="/lista_contactos"><button type="button">Regresar</button></a>
         <button name="editar" value="editar">Editar</button>
    </form>
